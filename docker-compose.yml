version: '3.8'

services:
  nakama-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nakama-server
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - ADMIN_KEY=${ADMIN_KEY:-your-super-secret-admin-key}
      - DOWNLOAD_KEY=${DOWNLOAD_KEY:-your-secure-download-key}
      - PORT=${PORT:-8080}
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-10737418240} # Default 10GB in bytes
      - GAMES_DIR=/data/nakama/games
      - MODPACKS_DIR=/data/nakama/modpacks
    volumes:
      - nakama-data:/data/nakama

volumes:
  nakama-data:
    name: nakama-data
